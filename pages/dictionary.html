<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dictionary</title>
  <script src="../node_modules/lunr/lunr.min.js"></script>
  <script src="../node_modules/marked/lib/marked.umd.js"></script>
</head>
<body>
<div id="nav-bar"></div>
<script src="../js/fetch-nav.js"></script>

  <div id="article">Loading...</div>
  <script>
    fetch("../docs/Dictionary.md")
      .then(r => r.text())
      .then(md => {
        document.getElementById("article").innerHTML = marked.parse(md);
      });
  </script>
</body>
</html>
