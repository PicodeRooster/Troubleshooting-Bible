<body>
<nav>
  <ul>
    <li>Dictionary</li>
    <li>Encyclopedia</li>
    <li>How-To Guides</li>
    <li>Resources</li>
    <li>Bibliography</li>
  </ul>
  <div id="search"> 
    <input id="search-input" type="text" placeholder="Search...">
    <ul id="search-results"></ul>
  </div>
</nav>
  <div id="article">Loading...</div>
  <script>
    fetch("docs/Introduction.md")
      .then(r => r.text())
      .then(md => {
        document.getElementById("article").innerHTML = marked.parse(md);
      });
  </script>
  <script>
    let index, documents;

fetch("docs/Introduction.md")
  .then(r => r.text())
  .then(text => {
    documents = [{ id: "Introduction", body: text }];

    index = lunr(function () {
      this.ref("id");
      this.field("body");
      documents.forEach(doc => this.add(doc));
    });
  });
  </script>
