<nav>
  <ul>
    <li class="selected">Home</li>
    <li>Dictionary</li>
    <li>Encyclopedia</li>
    <li>How-To Guides</li>
    <li>Resources</li>
    <li>Bibliography</li>
  </ul>  
    
    <span class="search-box">
    <form>
    <input id="search-input" type="text" placeholder="Search...">
    <ul id="search-results"></ul>
    <button><img src="assets/images/icons/magnifying-glass.svg" width="10px"></button>
    </form>
    </span>
  
</nav>


  <div id="article">Loading...</div>
  <script>
    fetch("docs/Introduction.md")
      .then(r => r.text())
      .then(md => {
        document.getElementById("article").innerHTML = marked.parse(md);
      });
  </script>
  <script>
    let index, documents;

fetch("docs/Introduction.md")
  .then(r => r.text())
  .then(text => {
    documents = [{ id: "Introduction", body: text }];

    index = lunr(function () {
      this.ref("id");
      this.field("body");
      documents.forEach(doc => this.add(doc));
    });
  });
  </script>
